<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 面试练习</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:           #faf9f5;
      --surface:      #ffffff;
      --border:       #e5e0d8;
      --text:         #1a1a1a;
      --text-muted:   #7a7472;
      --accent:       #cc785c;
      --accent-hover: #b5623f;
      --accent-light: #fdf4f0;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }

    /* Blinking cursor */
    .cursor::after { content: '▋'; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Markdown */
    .prose { line-height: 1.75; }
    .prose h1, .prose h2, .prose h3 { font-weight: 600; margin: 0.8rem 0 0.3rem; }
    .prose ul, .prose ol { padding-left: 1.4rem; margin: 0.3rem 0; }
    .prose li { margin: 0.2rem 0; }
    .prose p { margin: 0.3rem 0; }
    .prose strong { font-weight: 600; }
    .prose hr { margin: 0.6rem 0; border-color: var(--border); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0cac2; border-radius: 3px; }

    /* Form inputs */
    textarea {
      font-family: inherit;
      font-size: 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--surface);
      color: var(--text);
      width: 100%;
      resize: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      line-height: 1.6;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(204,120,92,0.12);
    }
    textarea:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Buttons */
    .btn {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; padding: 0.55rem 1.2rem; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      font-size: 0.82rem;
    }
    .btn-ghost:hover { border-color: #c0bab2; color: var(--text); }
    .btn-ghost.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    /* Agent card */
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      border-left-width: 3px;
    }
    .agent-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .agent-body {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.75;
    }

    /* User card */
    .user-card {
      background: #f5f1eb;
      border: 1px solid #e8e2d8;
      border-radius: 10px;
      padding: 14px 16px;
      border-left: 3px solid #a89880;
    }
  </style>
</head>
<body style="height: 100vh; display: flex; flex-direction: column; overflow: hidden;">

  <!-- Header -->
  <header style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <div style="width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; flex-shrink: 0;">面</div>
      <span style="font-weight: 600; font-size: 0.95rem;">AI 面试练习</span>
    </div>
    <button id="export-btn" class="btn btn-ghost" style="display:none;" onclick="exportRecord()">导出记录</button>
  </header>

  <!-- Setup Form -->
  <div id="setup" style="flex: 1; overflow-y: auto; padding: 32px 16px;">
    <div style="max-width: 560px; margin: 0 auto;">
      <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 24px;">输入岗位信息和简历，开始模拟面试</p>

      <div style="display: flex; flex-direction: column; gap: 18px;">
        <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px;">GLM API Key</label>
          <input id="api-key" type="password"
            style="font-family:inherit;font-size:0.875rem;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--surface);color:var(--text);width:100%;outline:none;transition:border-color 0.15s,box-shadow 0.15s;"
            placeholder="在 open.bigmodel.cn 免费获取..."
            onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px rgba(204,120,92,0.12)'"
            onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'">
          <p style="font-size:0.75rem;color:var(--text-muted);margin:4px 0 0;">Key 仅在本次会话使用，不会上传至服务器以外。注册即送免费额度。</p>
        </div>

        <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px;">岗位 JD</label>
          <textarea id="jd" rows="5" placeholder="粘贴岗位描述..."></textarea>
        </div>

        <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px;">简历</label>
          <textarea id="resume" rows="7" placeholder="粘贴简历内容（建议脱敏处理）..."></textarea>
        </div>

        <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 8px;">面试官风格</label>
          <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;">
            <button id="btn-default" class="btn btn-ghost active" onclick="setStyle('default')">默认通用</button>
            <button id="btn-custom"  class="btn btn-ghost"        onclick="setStyle('custom')">自定义</button>
          </div>
          <textarea id="style-input" rows="3" style="display:none;" placeholder="描述面试官的特点与偏好..."></textarea>
        </div>

        <button onclick="startInterview()" class="btn btn-primary" style="width: 100%; padding: 0.65rem; font-size: 0.9rem;">开始面试</button>
      </div>
    </div>
  </div>

  <!-- Conversation -->
  <div id="conversation" style="display:none; flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px;"></div>

  <!-- Answer Input -->
  <div id="answer-area" style="display:none; flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 14px 16px;">
    <div style="max-width: 760px; margin: 0 auto;">
      <div id="input-box" style="border: 1.5px solid var(--border); border-radius: 12px; background: var(--surface); padding: 8px 8px 8px 12px; display: flex; align-items: flex-end; gap: 8px; transition: border-color 0.15s, box-shadow 0.15s;">
        <textarea id="answer-input" rows="2"
          style="flex: 1; border: none; outline: none; resize: none; background: transparent; padding: 4px 0; box-shadow: none;"
          placeholder="输入你的回答..."
          onkeydown="if(event.ctrlKey && event.key==='Enter') submitAnswer()"
          onfocus="document.getElementById('input-box').style.cssText+='; border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(204,120,92,0.12) !important;'"
          onblur="document.getElementById('input-box').style.borderColor='var(--border)'; document.getElementById('input-box').style.boxShadow='none';">
        </textarea>
        <button id="submit-btn" class="btn btn-primary" onclick="submitAnswer()" style="flex-shrink: 0; margin-bottom: 2px;">发送</button>
      </div>
      <p style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 6px;">Ctrl + Enter 发送</p>
    </div>
  </div>

  <script>
    let useCustomStyle = false;
    let currentAgent = null;
    let currentEl = null;
    let currentText = '';
    let sessionId = null;

    marked.setOptions({ breaks: true });

    // ─── Style toggle ───────────────────────────────────────
    function setStyle(type) {
      useCustomStyle = type === 'custom';
      document.getElementById('btn-default').classList.toggle('active', !useCustomStyle);
      document.getElementById('btn-custom').classList.toggle('active', useCustomStyle);
      document.getElementById('style-input').style.display = useCustomStyle ? 'block' : 'none';
    }

    // ─── Start interview ────────────────────────────────────
    async function startInterview() {
      const jd = document.getElementById('jd').value.trim();
      const resume = document.getElementById('resume').value.trim();
      const api_key = document.getElementById('api-key').value.trim();
      if (!api_key) { alert('请填写 GLM API Key'); return; }
      if (!jd || !resume) { alert('请填写岗位JD和简历'); return; }
      const style = useCustomStyle ? document.getElementById('style-input').value.trim() : '';

      document.getElementById('setup').style.display = 'none';
      const conv = document.getElementById('conversation');
      conv.style.display = 'flex';
      document.getElementById('answer-area').style.display = 'block';
      document.getElementById('export-btn').style.display = 'inline-block';
      setInputEnabled(false);

      await streamSSE('/start', { jd, resume, style, api_key }, handlers(), (sid) => { sessionId = sid; });
    }

    // ─── Submit answer ──────────────────────────────────────
    async function submitAnswer() {
      const input = document.getElementById('answer-input');
      const answer = input.value.trim();
      if (!answer) return;
      input.value = '';
      setInputEnabled(false);
      addCard('user', answer);
      await streamSSE('/answer', { answer, session_id: sessionId }, handlers());
    }

    function handlers() {
      return {
        onSection: (agent) => startCard(agent),
        onToken: (text) => appendToken(text),
        onDone: () => { finalizeCard(); setInputEnabled(true); scrollDown(); },
      };
    }

    // ─── Input state ────────────────────────────────────────
    function setInputEnabled(on) {
      document.getElementById('answer-input').disabled = !on;
      document.getElementById('submit-btn').disabled = !on;
      if (on) document.getElementById('answer-input').focus();
    }

    // ─── Agent config ───────────────────────────────────────
    const AGENTS = {
      analyst:     { label: '匹配分析', color: '#8b6bb5' },
      interviewer: { label: '面试官',   color: '#6b8fa8' },
      evaluator:   { label: '评估师',   color: '#b5864a' },
      better:      { label: '示范回答', color: '#5c9b7a' },
      user:        { label: '我',       color: '#a89880' },
    };

    function startCard(agent) {
      finalizeCard();
      currentAgent = agent;
      currentText = '';
      const cfg = AGENTS[agent];
      const conv = document.getElementById('conversation');

      const card = document.createElement('div');
      card.className = 'agent-card';
      card.style.borderLeftColor = cfg.color;

      const lbl = document.createElement('div');
      lbl.className = 'agent-label';
      lbl.style.color = cfg.color;
      lbl.textContent = cfg.label;

      const body = document.createElement('div');
      body.className = 'agent-body cursor';

      card.append(lbl, body);
      conv.appendChild(card);
      currentEl = body;
      scrollDown();
    }

    function addCard(agent, text) {
      finalizeCard();
      const conv = document.getElementById('conversation');
      const card = document.createElement('div');
      card.className = 'user-card';
      card.innerHTML = `
        <div class="agent-label" style="color:#a89880;">我</div>
        <div class="agent-body" style="white-space:pre-wrap;">${esc(text)}</div>`;
      conv.appendChild(card);
      scrollDown();
    }

    function appendToken(text) {
      if (!currentEl) return;
      currentText += text;
      currentEl.textContent = currentText;
      scrollDown();
    }

    function finalizeCard() {
      if (!currentEl) return;
      currentEl.classList.remove('cursor');
      if (currentAgent === 'analyst' || currentAgent === 'evaluator' || currentAgent === 'better') {
        currentEl.classList.add('prose');
        currentEl.innerHTML = marked.parse(currentText);
      }
      currentEl = null;
      currentAgent = null;
    }

    function scrollDown() {
      const conv = document.getElementById('conversation');
      conv.scrollTop = conv.scrollHeight;
    }

    function esc(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── Export ─────────────────────────────────────────────
    function exportRecord() { window.location.href = '/export?session_id=' + sessionId; }

    // ─── SSE fetch ──────────────────────────────────────────
    async function streamSSE(url, body, { onSection, onToken, onDone }, onSessionId) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (onSessionId) {
        const sid = res.headers.get('X-Session-Id');
        if (sid) onSessionId(sid);
      }
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop() ?? '';
        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          try {
            const d = JSON.parse(part.slice(6));
            if (d.type === 'section') onSection?.(d.agent);
            else if (d.type === 'token') onToken?.(d.text);
            else if (d.type === 'done') onDone?.();
          } catch {}
        }
      }
    }
  </script>
</body>
</html>
